name: Update Stock Metrics

on:
  schedule:
    # 北京时间工作日 09:00 / 09:30 / 10:00 / 10:30
    - cron: "0,33 1-2 * * 1-5"
    # 北京时间工作日 11:00 / 11:30
    - cron: "0,33 3 * * 1-5"
    # 北京时间工作日 13:00 / 13:30 / 14:00 / 14:30
    - cron: "0,33 5-6 * * 1-5"
    # 北京时间工作日 15:00
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "update-metrics"
  cancel-in-progress: true

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh metrics
        run: python scripts/update_data.py

      - name: Commit metrics changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add docs/data/metrics.json

          git diff --staged --quiet || git commit -m "auto update stock metrics"

      - name: Push changes
        run: git push
