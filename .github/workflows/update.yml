name: Update Stock Data

on:
  schedule:
    # 上午盘
    - cron: '0,30 1-2 * * 1-5'
    - cron: '0,30 3 * * 1-5'

    # 下午盘
    - cron: '0,30 5-6 * * 1-5'
    - cron: '0 7 * * 1-5'

  workflow_dispatch:

jobs:
  update-stock:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install yfinance pandas

      # 4. 运行脚本
      - name: Run stock updater
        run: |
          cd scripts
          python fetch_prices.py

      # 5. 自动提交
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"

          git add public/data/enriched.json

          git diff --staged --quiet || git commit -m "auto update stock data"

      # 6. 推送回 GitHub
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
